<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Sammaelova Fabrika v3.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background: #eef2f3; color: #333; }
        .box { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 15px 0; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; }
        pre { background: #2d3436; color: #fab1a0; padding: 20px; overflow-x: auto; border-radius: 8px; font-size: 0.9em; line-height: 1.4; }
        button { width: 100%; padding: 15px; background: #8fb339; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.3s; }
        button:hover { background: #7a9a30; transform: translateY(-2px); }
        h2 { color: #8fb339; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🛠️ Sammaelov Generátor Vizitiek v3.0</h2>
        <p>Skopíruj sem celý text z e-mailu (Formspree):</p>
        <textarea id="inputData" placeholder="Sem vlož text z mailu..."></textarea>
        <button onclick="generateCode()">VYROBIŤ KÓD VIZITKY</button>
        <button onclick="let n = prompt('Zadaj ID pre NASLEDUJÚCU vizitku:', nextId); if(n) setNextId(parseInt(n))" 
        style="margin-top: 10px; background: #7f8c8d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">
    ⚙️ Nastaviť ďalšie ID
</button>

        <h3>Výsledný kód pre tvoj index.html:</h3>
        <pre id="outputCode">Tu sa objaví hotový kód...</pre>
    </div>

<script>
    // 1. Pozrieme sa do pamäte prehliadača. Ak tam nič nie je, začneme od 2.
    let nextId = parseInt(localStorage.getItem('lastUsedId')) || 2;

    function generateCode() {
        const rawText = document.getElementById('inputData').value;
        
        // Funkcia na vyťahovanie bežných riadkov (meno, lokalita...)
        const grab = (key) => {
            const regex = new RegExp(key + "[:\\s]*([\\s\\S]*?)(?:\\n|$)", "i");
            const match = rawText.match(regex);
            return (match && match[1]) ? match[1].trim() : "";
        };

        // Špeciálna funkcia pre POPIS - zoberie všetko od "popis:" až po koniec, vrátane prázdnych riadkov
        const grabPopis = () => {
            const regex = /popis[:\s]*([\s\S]*?)(?=\n(?:telefon|email|facebook|telegram|galeria|_replyto|$))/i;
            const match = rawText.match(regex);
            if (match && match[1]) {
                let text = match[1].trim();
                // Tu sa deje to kúzlo: zmeníme skutočné Entery na značky \n pre JSON
                return text.replace(/\r?\n/g, "\\n").replace(/"/g, '\\"');
            }
            return "";
        };

        const entry = {
            id: nextId,
            kat: grab("kategoria").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            meno: grab("meno"),
            lok: grab("lokalita"),
            popis: grabPopis(), // Použijeme našu novú "pílu" na popis
            tel: grab("telefon"),
            email: grab("email") || grab("_replyto"), 
            fb: grab("facebook"),
            tg: grab("telegram"),
            gal: grab("galeria")
        };

        // Vygenerujeme čistý JSON pripravený na vloženie do data.json
        const jsonString = ",\n" + JSON.stringify(entry, null, 2);
        document.getElementById('outputCode').innerText = jsonString;

        // 2. Posunieme ID a uložíme ho do pamäte "na kriedu"
        nextId++;
        localStorage.setItem('lastUsedId', nextId);
        
        console.log("Ďalšia vizitka bude mať ID:", nextId);
    }

    function setNextId(number) {
        nextId = number;
        localStorage.setItem('lastUsedId', nextId);
        alert("Nastavené! Nasledujúca vizitka dostane ID: " + nextId);
    }
</script>
</body>
</html>
