<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrácia - Vizitkár SPDR</title>
    <style>
        :root { --primary: #8fb339; --bg: #fdfdfd; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
        input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Pridať sa do Vizitkára</h2>
    <form action="https://formspree.io/f/mwvwvkvr" method="POST">
        <label>Meno / Názov podniku:</label>
        <input type="text" name="meno" required placeholder="Napr. Jozef - Medár">
        
        <label>Lokalita (Pôsobenie):</label>
        <input type="text" name="lokalita" required placeholder="Napr. Košice, okolie">
        
        <label>Kategória (Remeslo/Služba):</label>
        <label>Kategória (Vyberte jednu):</label>
        <select name="kategoria" required>
            <option value="" disabled selected>-- Vyberte kategóriu --</option>
            <option value="Obživa">Obživa</option>
            <option value="Remeslá a materiál">Remeslá a materiál</option>
            <option value="Ubytovanie a prenájom">Ubytovanie a prenájom</option>
            <option value="Odborné služby">Odborné služby</option>
            <option value="Vzdelávanie">Vzdelávanie</option>
            <option value="Záhrada a gazdovstvo">Záhrada a gazdovstvo</option>
            <option value="Iné">Iné</option>
        </select>

        <label>Krátky popis (Čo ponúkate):</label>
        <textarea name="popis" rows="3" placeholder="Pár slov o vašej práci..."></textarea>

        <label>Telefónne číslo:</label>
        <input type="tel" name="telefon" required placeholder="+421 9xx xxx xxx">

		<label>E-mailová adresa:</label>
        <input type="email" name="_replyto" required placeholder="vas@email.sk">

        <button type="submit">Odoslať na schválenie</button>
    </form>
    <a href="index.html" class="back-link">← Späť na zoznam</a>
</div>

</body>
</html>
