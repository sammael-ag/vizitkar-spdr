<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizitkár SPDR</title>
    <style>
        :root { --primary: #8fb339; --bg: #fdfdfd; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--primary); margin-bottom: 20px; }
/* --- Zjednodušené CSS pre vizitky (Vymeň v index.html) --- */
/* --- Inteligentné CSS pre vizitky (Vymeň v index.html) --- */
.card {
    background: white;
    padding: 30px; /* Trochu viac priestoru vnútri */
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    
    /* MÁGIA TU: Na mobile (úzkom displeji) bude mať šírku 100%, 
       ale na desktope (širokom displeji) sa roztiahne, ale len po max. 600px, 
       aby to nebol zase extrémne široký slíž. */
    width: 100%; 
    max-width: 600px; 
    
    margin: 10px auto; /* Vycentruje vizitku a dá medzery */
    display: flex;
    flex-direction: column;
    align-items: center; 
    text-align: center;
    transition: 0.3s;
    position: relative;
    box-sizing: border-box; /* Dôležité pre správne počítanie paddingu */
}

/* Na desktope chceme, aby sa vizitky radili vedľa seba, ak sa zmestia,
   takže upravíme aj ich obal (#list). Ak chceš mať vždy len jednu vizitku 
   na riadok a centrovanú (ako v "Prvom úspechu"), vymeň aj #list za toto: */

#list {
    display: flex;
    flex-direction: column; /* Vizitky pod sebou, vycentrované */
    align-items: center;
    gap: 20px;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.card .tag {
    background: #eef2f3;
    color: #8fb339;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.8em;
    font-weight: bold;
    position: absolute;
    top: 15px;
    right: 15px;
}

.card .name {
    font-size: 1.4em;
    font-weight: bold;
    color: #333;
    margin-top: 25px; /* Priestor pre tag */
    margin-bottom: 5px;
}

.card .loc {
    font-size: 0.9em;
    color: #888;
    margin-bottom: 15px;
}

.card .cat {
    font-size: 1em;
    color: #555;
    margin-bottom: 20px;
    flex-grow: 1; /* Popis vyplní priestor, aby boli tlačidlá v jednej rovine */
}

.btn-call {
    display: block;
    width: 100%;
    padding: 12px;
    background: #8fb339;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
    margin-bottom: 10px;
}

.btn-call:hover {
    background: #7a9a30;
}

.social-links {
    display: flex;
    gap: 15px;
    justify-content: center;
    width: 100%;
    margin-top: 10px;
}

.social-links a {
    text-decoration: none;
    font-weight: bold;
    font-size: 0.9em;
}

select, #searchInput {
    width: 100%;
    max-width: 400px;
    padding: 12px 15px;
    margin: 5px 0;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 16px; /* Dôležité pre mobil, aby zoom neblbol */
    outline: none;
    transition: 0.3s;
}

select:focus, #searchInput:focus {
    border-color: #8fb339;
}

.filter-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 30px;
}

/* --- NOVÉ CSS PRE ELEGANTNÉ TLAČIDLÁ --- */

/* Kontajner, ktorý ich drží v jednom rade */
.card-actions-row {
    display: flex;
    gap: 8px; /* Medzera medzi nimi */
    margin-top: 15px;
    margin-bottom: 15px;
    width: 100%;
}

/* Spoločný štýl pre všetky akčné tlačidlá (nízke a elegantné) */
.btn-action {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 35px;        /* Ešte o kúsok nižšie, aby to bolo fakt "nízke" */
    border-radius: 18px;
    border: none;
    font-size: 0.85em;   /* Trošku menšie písmo, aby sa tam tie slová vedľa seba vošli */
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    color: white;
    gap: 5px;            /* Medzera medzi ikonkou a textom */
    padding: 0 10px;     /* Vnútorná rezerva */
}

/* Jemný efekt pri prejdení myšou */
.btn-action:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    opacity: 0.9;
}

/* Konkrétne farby pre každé tlačidlo */
.btn-phone {
    background-color: #8bc34a; /* Jemná zelená pre volanie */
}

.btn-share {
    background-color: #2ecc71; /* Výraznejšia zelená pre zdieľanie */
}

.btn-email {
    background-color: #7f8c8d; /* Neutrálna sivá pre email */
}
#backToTop {
    display: none; /* Na začiatku ho nevidno */
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 99;
    border: none;
    outline: none;
    background-color: #8bc34a; /* Tvoja pekná zelená */
    color: white;
    cursor: pointer;
    padding: 10px 15px;
    border-radius: 50%; /* Krásny krúžok */
    font-size: 20px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: opacity 0.3s;
}

#backToTop:hover {
    background-color: #2ecc71; /* Trošku sa rozsvieti pri dotyku */
    transform: scale(1.1);
}

/* --------------------------------------------------------- */
    </style>
</head>
<body>
<div class="container">
<header>
        <h1>🌿 Vizitkár ROD</h1>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 20px;">Neoficiálna komunitná sieť Slovenského podielového družstva ROD</p>
        
        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <a href="registracia.html" style="padding:10px 20px; background:var(--primary); color:white; border-radius:25px; text-decoration:none; font-weight:bold; font-size:0.85em;">➕ Pridať moju vizitku</a>
            <a href="https://t.me/Sammael777" target="_blank" style="padding:10px 20px; background:white; color:#0088cc; border:2px solid #0088cc; border-radius:25px; text-decoration:none; font-weight:bold; font-size:0.85em;">💬 Napísať správcovi</a>
            <a href="faq.html" style="padding:10px 20px; background:white; color:#666; border:2px solid #ddd; border-radius:25px; text-decoration:none; font-weight:bold; font-size:0.85em;">❓ FAQ</a>
        </div>

<div class="filter-container" style="text-align: center; max-width: 400px; margin: 0 auto 30px auto; padding: 0 15px;">
    <select id="categorySelect" onchange="filterByCategory()" 
            style="width: 100%; padding: 12px; border-radius: 25px; border: 2px solid #ddd; font-size: 1em; outline: none; margin-bottom: 10px; cursor: pointer; background: white;">
        <option value="vsetko">Všetky kategórie</option>
        <option value="obziva">Obživa a poživatiny</option>
        <option value="remesla">Remeslá a materiál</option>
        <option value="sluzby">Odborné služby</option>
        <option value="vzdelavanie">Vzdelávanie a rozvoj</option>
        <option value="knihy">Knihy</option>
        <option value="zdravie">Zdravie a zdravotnícke pomôcky</option>
        <option value="oblecenie">Oblečenie a doplnky</option>
        <option value="auto">Auto-moto</option>
        <option value="volno">Zážitkové aktivity a voľný čas</option>
        <option value="elektro">Elektro - čierna/biela technika</option>
        <option value="rodina">Deti a rodina</option>
        <option value="ubytovanie">Ubytovanie a prenájom</option>
        <option value="zahrada">Záhrada a gazdovstvo</option>
        <option value="nabytok">Nábytok a zariadenie domácnosti</option>
        <option value="kultura">Kultúra a umenie</option>
        <option value="osobne">Osobné služby</option>
        <option value="tvorba">Ručné práce a tvorba</option>
        <option value="ine">Iné</option>
    </select>

    <input type="text" id="searchInput" onkeyup="searchLocation()" placeholder="🔍 Hľadať podľa mesta alebo okresu..." 
           style="width: 100%; padding: 12px; border-radius: 25px; border: 2px solid #ddd; font-size: 1em; outline: none; box-sizing: border-box;">
</div>
<script>
let currentCategory = 'vsetko';

// Pomocná funkcia: Odstráni dĺžne a mäkčene (hoblík na diakritiku)
function removeAccents(str) {
    return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// Spustí sa pri zmene v Select menu
function filterByCategory() {
    const select = document.getElementById('categorySelect');
    if (select) {
        currentCategory = select.value;
        applySearchAndFilter();
    }
}

// Reaguje na písanie v hľadaní
function searchLocation() {
    applySearchAndFilter();
}

// Hlavný vyhodnocovací proces
function applySearchAndFilter() {
    // 1. Vyčistíme hľadaný text (malé písmená + bez diakritiky)
    let rawSearch = document.getElementById('searchInput').value.toLowerCase();
    let searchInput = removeAccents(rawSearch);
    
    let cards = document.querySelectorAll('.card');

    cards.forEach(card => {
        // 2. Získame dáta z vizitky
        let cardCategory = card.getAttribute('data-category') || "ine";
        let locationText = card.querySelector('.loc').innerText.toLowerCase();
        let cleanLocation = removeAccents(locationText);

        // 3. Logika kategórie
        let matchCategory = (currentCategory === 'vsetko' || cardCategory === currentCategory);

        // 4. Logika hľadania (Lokalita) - reaguje už od 2 znakov pre lepší pocit
        let matchSearch = true;
        if (searchInput.length >= 2) {
            matchSearch = cleanLocation.includes(searchInput);
        }

        // 5. Finálne zobrazenie
        if (matchCategory && matchSearch) {
            card.style.display = 'flex';
        } else {
            card.style.display = 'none';
        }
    });
}
// Táto funkcia nasaje dáta z JSONu a postaví vizitky
async function loadCards() {
    try {
        const response = await fetch('data.json');
        const data = await response.json();
        const list = document.getElementById('list');
        list.innerHTML = '';

        // Zistíme, či máme v adrese konkrétne ID (napr. ?id=2)
        const urlParams = new URLSearchParams(window.location.search);
        const shareId = urlParams.get('id');

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.setAttribute('data-category', item.kat);
            
            // Pridáme vizitke unikátne ID aj do HTML, aby sme ju vedeli "chytiť"
            card.id = "card-" + item.id;

            card.innerHTML = `
                <span class="tag">${item.kat}</span>
                <span class="name">${item.meno}</span>
                <span class="loc">📍 ${item.lok}</span>
                <div class="cat">${item.popis}</div>
                
<div class="card-actions-row">
    <a href="tel:${item.tel.replace(/\s/g, '')}" class="btn-action btn-phone">
        📞 Volať
    </a>
    <button onclick="copyShareLink(${item.id})" class="btn-action btn-share">
        🔗 Zdieľať
    </button>
    ${item.email ? `
    <a href="mailto:${item.email}" class="btn-action btn-email">
        ✉️ Email
    </a>` : ''}
</div>
                
                <div class="social-links">
                    ${item.fb ? `<a href="${item.fb}" target="_blank" style="color: #1877F2;">Facebook</a>` : ''}
                    ${item.tg ? `<a href="${item.tg}" target="_blank" style="color: #0088cc;">Telegram</a>` : ''}
                    ${item.gal ? `<a href="${item.gal}" target="_blank" style="color: #ea4335;">🖼️ Galéria</a>` : ''}
                </div>
            `;
            list.appendChild(card);
        });

        // AK MÁME SHARE ID: Počkáme sekundu a odfiltrujeme všetko ostatné
        if (shareId) {
            setTimeout(() => {
                filterToSpecificId(shareId);
            }, 100);
        } else {
            applySearchAndFilter(); 
        }

    } catch (error) {
        console.error("Chyba pri nakladaní vizitiek:", error);
    }
}

// Spustíme to hneď pri načítaní stránky
window.onload = loadCards;
// Funkcia, ktorá skopíruje link do schránky
function copyShareLink(id) {
    const baseUrl = window.location.origin + window.location.pathname;
    const shareUrl = baseUrl + "?id=" + id;
    
    navigator.clipboard.writeText(shareUrl).then(() => {
        alert("Odkaz na túto vizitku bol skopírovaný! Môžeš ho poslať ďalej. ✨");
    });
}

// Funkcia, ktorá ukáže len jednu konkrétnu vizitku
function filterToSpecificId(id) {
    let cards = document.querySelectorAll('.card');
    cards.forEach(card => {
        if (card.id === "card-" + id) {
            card.style.display = 'flex';
            // Scrollneme na ňu, aby bola v strede
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
            card.style.display = 'none';
        }
    });
    
    // Nastavíme select na "Všetko", aby to nemiatlo používateľa
    document.getElementById('categorySelect').value = 'vsetko';
}
// Keď používateľ scrolluje, zavoláme túto funkciu
window.onscroll = function() { scrollFunction() };

function scrollFunction() {
    const btn = document.getElementById("backToTop");
    // Ukáže sa po 300px od vrchu
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
}

// Funkcia na plynulý návrat nahor
function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: 'smooth' // Toto zabezpečí ten "vznešený let" namiesto seknutia
    });
}
</script>
    
    <div id="list"></div>
</div>
<footer style="margin-top: 50px; padding: 30px 20px; border-top: 1px solid #eee; text-align: center; color: #888; font-size: 0.85em;">
        <p>Spravuje: <strong>Sammael</strong> | Projekt pre komunitu ROD</p>
        
        <div style="margin-top: 10px;">
            <a href="https://t.me/+EYOYWMIKo1M4ZGM0" target="_blank" style="color: #0088cc; text-decoration: none; font-weight: bold;">
                🌐 Rodový Jarmok
            </a>
        </div>
        
        <p style="margin-top: 20px; font-style: italic; opacity: 0.7;">
            "Sila je v jednote, radosť v spolupráci."
        </p>
    </footer>
    <button onclick="scrollToTop()" id="backToTop" title="Hore">
    ↑
</button>
</body>
</html>
